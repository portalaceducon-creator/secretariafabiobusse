<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Secretária Pessoal — Fabio</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --navy:      #0D1B3E;
  --navy2:     #162450;
  --navy3:     #1E2F5F;
  --navy-soft: #EEF1F8;
  --navy-mid:  #C5CEDF;
  --gold:      #C9A227;
  --gold2:     #E2B83A;
  --gold3:     #F5D060;
  --gold-soft: #FBF4DC;
  --gold-mid:  #E8C96A;
  --bg:        #F2F4F9;
  --surface:   #FFFFFF;
  --surface2:  #EEF1F8;
  --border:    rgba(13,27,62,0.12);
  --border2:   rgba(13,27,62,0.07);
  --text:      #0D1B3E;
  --text2:     #4A5578;
  --text3:     #8E99B8;
  --r:  10px;
  --r2: 16px;
  --c-trad:    #0D5E6E; --c-trad-bg:    #E0F4F7;
  --c-comp:    #0D1B3E; --c-comp-bg:    #EEF1F8;
  --c-aula:    #7A5C00; --c-aula-bg:    #FBF4DC;
  --c-prazo:   #8C1C1C; --c-prazo-bg:   #FDEAEA;
  --c-pessoal: #2A5C2A; --c-pessoal-bg: #E7F4E7;
}
* { box-sizing:border-box; margin:0; padding:0; }
body { font-family:'DM Sans',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; font-size:14px; line-height:1.5; }

/* HEADER */
.header {
  background:linear-gradient(135deg,var(--navy) 0%,var(--navy3) 100%);
  padding:0 24px; display:flex; justify-content:space-between; align-items:center;
  position:sticky; top:0; z-index:100; height:66px;
  box-shadow:0 2px 16px rgba(13,27,62,0.4);
}
.header::after { content:''; position:absolute; bottom:0; left:0; right:0; height:3px; background:linear-gradient(90deg,var(--gold),var(--gold3),var(--gold)); }
.logo-wrap { display:flex; align-items:center; gap:12px; }
.logo-icon { width:38px; height:38px; border-radius:10px; background:linear-gradient(135deg,var(--gold),var(--gold3)); display:flex; align-items:center; justify-content:center; font-size:18px; flex-shrink:0; box-shadow:0 2px 8px rgba(201,162,39,0.4); }
.logo { font-family:'Playfair Display',serif; font-size:18px; font-weight:700; color:#fff; }
.logo-sub { font-size:11px; color:var(--gold-mid); margin-top:1px; letter-spacing:0.3px; }
.clock { font-size:22px; font-weight:600; color:#fff; font-variant-numeric:tabular-nums; text-align:right; }
.date-str { font-size:11px; color:var(--gold-mid); text-align:right; margin-top:1px; }

/* MAIN */
.main { max-width:840px; margin:0 auto; padding:18px 16px; }

/* STATS */
.stats { display:grid; grid-template-columns:repeat(4,1fr); gap:12px; margin-bottom:18px; }
.stat { background:var(--surface); border-radius:var(--r2); padding:14px 16px; border:1px solid var(--border2); border-top:3px solid var(--navy-mid); position:relative; overflow:hidden; }
.stat::before { content:''; position:absolute; bottom:-12px; right:-12px; width:60px; height:60px; border-radius:50%; background:var(--navy-soft); opacity:0.6; }
.stat.s-today { border-top-color:var(--gold); }
.stat.s-late  { border-top-color:#C0392B; }
.stat.s-done  { border-top-color:#2A7A2A; }
.stat-n { font-size:30px; font-weight:700; line-height:1; color:var(--navy); }
.stat.s-today .stat-n { color:var(--gold); }
.stat.s-late  .stat-n { color:#C0392B; }
.stat.s-done  .stat-n { color:#2A7A2A; }
.stat-l { font-size:11px; color:var(--text3); margin-top:5px; text-transform:uppercase; letter-spacing:0.06em; font-weight:500; }

/* TABS */
.tabs { display:flex; gap:3px; background:var(--navy); border-radius:var(--r2); padding:5px; margin-bottom:18px; box-shadow:0 2px 12px rgba(13,27,62,0.25); }
.tab { flex:1; padding:9px 6px; text-align:center; font-size:13px; font-weight:500; color:rgba(255,255,255,0.5); cursor:pointer; border-radius:10px; border:none; background:none; transition:all 0.2s; font-family:'DM Sans',sans-serif; }
.tab:hover { color:rgba(255,255,255,0.8); }
.tab.active { background:linear-gradient(135deg,var(--gold),var(--gold2)); color:var(--navy); font-weight:700; box-shadow:0 2px 8px rgba(201,162,39,0.4); }

/* CARDS */
.card { background:var(--surface); border-radius:var(--r2); border:1px solid var(--border2); border-left:4px solid var(--navy-mid); padding:14px 18px; margin-bottom:10px; transition:box-shadow 0.15s,border-color 0.15s; }
.card:hover { box-shadow:0 3px 14px rgba(13,27,62,0.1); border-left-color:var(--gold); }
.card.cat-trad    { border-left-color:var(--c-trad); }
.card.cat-comp    { border-left-color:var(--navy3); }
.card.cat-aula    { border-left-color:var(--gold); }
.card.cat-prazo   { border-left-color:#C0392B; }
.card.cat-pessoal { border-left-color:#2A7A2A; }
.card-header { display:flex; align-items:flex-start; justify-content:space-between; gap:12px; }
.card-title { font-size:15px; font-weight:500; flex:1; line-height:1.4; color:var(--navy); }
.card-title.done-text { text-decoration:line-through; color:var(--text3); }
.card-meta { display:flex; align-items:center; gap:8px; margin-top:8px; flex-wrap:wrap; }
.badge { font-size:11px; font-weight:600; padding:3px 9px; border-radius:20px; }
.badge-trad    { background:var(--c-trad-bg);    color:var(--c-trad); }
.badge-comp    { background:var(--navy-soft);     color:var(--navy3); }
.badge-aula    { background:var(--gold-soft);     color:var(--c-aula); }
.badge-prazo   { background:var(--c-prazo-bg);    color:var(--c-prazo); }
.badge-pessoal { background:var(--c-pessoal-bg);  color:var(--c-pessoal); }
.overdue-badge { font-size:11px; background:#FDEAEA; color:#8C1C1C; padding:3px 9px; border-radius:20px; font-weight:600; }
.time-text { font-size:12px; color:var(--text2); }
.prio-dot { width:8px; height:8px; border-radius:50%; display:inline-block; flex-shrink:0; }
.dot-alta { background:#E24B4A; } .dot-media { background:#E2A827; } .dot-baixa { background:#4A9B4A; }
.card-actions { display:flex; gap:5px; flex-shrink:0; }
.btn-icon { width:30px; height:30px; border-radius:8px; border:1px solid var(--border); background:none; cursor:pointer; display:flex; align-items:center; justify-content:center; font-size:13px; color:var(--text2); transition:all 0.1s; font-family:'DM Sans',sans-serif; }
.btn-icon:hover { background:var(--navy-soft); border-color:var(--navy-mid); color:var(--navy); }
.btn-check { color:#2A7A2A; }
.card-notes { font-size:13px; color:var(--text2); margin-top:10px; padding-top:10px; border-top:1px solid var(--border2); }

/* ADD FORM */
.add-toggle { display:flex; align-items:center; gap:10px; width:100%; padding:11px 18px; background:none; border:2px dashed var(--navy-mid); border-radius:var(--r2); cursor:pointer; color:var(--text2); font-size:14px; font-family:'DM Sans',sans-serif; margin-bottom:12px; transition:all 0.2s; }
.add-toggle:hover { background:var(--surface); border-color:var(--gold); color:var(--navy); }
.add-plus { width:26px; height:26px; border-radius:8px; background:var(--gold-soft); color:var(--gold); display:flex; align-items:center; justify-content:center; font-size:16px; font-weight:700; flex-shrink:0; }
.add-form { background:var(--surface); border-radius:var(--r2); border:2px solid var(--gold-mid); padding:20px 22px; margin-bottom:12px; }
.add-form-title { font-family:'Playfair Display',serif; font-size:17px; font-weight:600; color:var(--navy); margin-bottom:16px; display:flex; align-items:center; gap:8px; }
.add-form-title::before { content:''; display:block; width:4px; height:22px; background:linear-gradient(to bottom,var(--gold),var(--gold2)); border-radius:2px; }
.form-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:12px; }
.form-grid.one   { grid-template-columns:1fr; }
.form-grid.three { grid-template-columns:1fr 1fr 1fr; }
.form-group label { font-size:11px; font-weight:600; color:var(--text2); display:block; margin-bottom:5px; text-transform:uppercase; letter-spacing:0.05em; }
input[type=text],input[type=number],input[type=date],input[type=time],select,textarea { width:100%; padding:9px 12px; font-size:14px; border:1px solid var(--border); border-radius:9px; background:var(--bg); color:var(--text); font-family:'DM Sans',sans-serif; outline:none; transition:border-color 0.15s; }
input:focus,select:focus,textarea:focus { border-color:var(--gold); background:var(--surface); box-shadow:0 0 0 3px rgba(201,162,39,0.12); }
textarea { resize:vertical; min-height:64px; }
.form-actions { display:flex; gap:8px; justify-content:flex-end; margin-top:6px; }
.btn { padding:9px 22px; border-radius:9px; font-size:14px; font-weight:600; cursor:pointer; font-family:'DM Sans',sans-serif; transition:all 0.15s; }
.btn-primary { background:linear-gradient(135deg,var(--navy),var(--navy3)); color:#fff; border:none; box-shadow:0 2px 8px rgba(13,27,62,0.25); }
.btn-primary:hover { opacity:0.88; }
.btn-gold { background:linear-gradient(135deg,var(--gold),var(--gold2)); color:var(--navy); border:none; font-weight:700; box-shadow:0 2px 8px rgba(201,162,39,0.3); }
.btn-gold:hover { opacity:0.9; }
.btn-ghost { background:none; border:1px solid var(--border); color:var(--text2); }
.btn-ghost:hover { background:var(--navy-soft); color:var(--navy); }

/* SECTION TITLES */
.sec-title { font-size:11px; font-weight:700; color:var(--text3); text-transform:uppercase; letter-spacing:0.08em; padding:12px 0 6px; display:flex; align-items:center; gap:8px; }
.sec-title::after { content:''; flex:1; height:1px; background:var(--border2); }

/* FILTER */
.filter-bar { display:flex; gap:6px; margin-bottom:10px; flex-wrap:wrap; }
.f-btn { padding:5px 14px; border-radius:20px; font-size:12px; font-weight:500; cursor:pointer; border:1px solid var(--border); background:var(--surface); color:var(--text2); font-family:'DM Sans',sans-serif; transition:all 0.15s; }
.f-btn:hover { border-color:var(--navy-mid); color:var(--navy); }
.f-btn.active { background:var(--navy); color:var(--gold); border-color:var(--navy); font-weight:600; }

/* GREET */
.greet-wrap { background:linear-gradient(135deg,var(--navy) 0%,var(--navy3) 100%); border-radius:var(--r2); padding:20px 24px; margin-bottom:16px; display:flex; justify-content:space-between; align-items:center; box-shadow:0 4px 16px rgba(13,27,62,0.25); position:relative; overflow:hidden; }
.greet-wrap::before { content:''; position:absolute; right:-20px; top:-20px; width:130px; height:130px; border-radius:50%; background:rgba(201,162,39,0.1); }
.greet-wrap::after  { content:''; position:absolute; right:40px; bottom:-30px; width:80px; height:80px; border-radius:50%; background:rgba(201,162,39,0.07); }
.greet-name { font-family:'Playfair Display',serif; font-size:21px; font-weight:700; color:#fff; }
.greet-sub  { font-size:12px; color:var(--gold-mid); margin-top:3px; }
.greet-date { font-family:'Playfair Display',serif; font-size:30px; font-weight:700; color:var(--gold); line-height:1; text-align:right; }
.greet-day  { font-size:11px; color:var(--gold-mid); text-align:right; margin-top:3px; }

/* TIMELINE */
.timeline { position:relative; padding-left:24px; }
.timeline::before { content:''; position:absolute; left:8px; top:10px; bottom:10px; width:2px; background:linear-gradient(to bottom,var(--gold),var(--navy-mid)); border-radius:2px; }
.tl-item { position:relative; margin-bottom:10px; }
.tl-dot  { position:absolute; left:-20px; top:15px; width:12px; height:12px; border-radius:50%; background:var(--surface); border:2px solid var(--navy-mid); }
.tl-dot.tl-now  { border-color:var(--gold); background:var(--gold); box-shadow:0 0 0 3px rgba(201,162,39,0.2); }
.tl-dot.tl-done { border-color:#4A9B4A; background:#4A9B4A; }
.tl-time { font-size:11px; color:var(--text3); margin-bottom:3px; font-weight:500; }

/* CONFIG */
.cfg-section { margin-bottom:20px; }
.cfg-title { font-size:11px; font-weight:700; color:var(--gold); text-transform:uppercase; letter-spacing:0.08em; margin-bottom:12px; padding-bottom:8px; border-bottom:2px solid var(--gold-soft); }
.cfg-row { display:flex; align-items:center; justify-content:space-between; padding:11px 0; border-bottom:1px solid var(--border2); gap:12px; }
.cfg-label { font-size:14px; font-weight:500; color:var(--navy); }
.cfg-desc  { font-size:12px; color:var(--text3); margin-top:2px; }
.toggle { width:44px; height:24px; border-radius:12px; background:var(--navy-mid); border:none; cursor:pointer; position:relative; transition:background 0.2s; display:block; flex-shrink:0; }
.toggle.on { background:linear-gradient(135deg,var(--gold),var(--gold2)); }
.toggle::after { content:''; position:absolute; top:3px; left:3px; width:18px; height:18px; border-radius:50%; background:#fff; transition:left 0.2s; box-shadow:0 1px 4px rgba(0,0,0,0.2); }
.toggle.on::after { left:23px; }

/* OVERDUE */
.overdue-section { background:#FDEAEA; border:1px solid #F5B7B7; border-left:4px solid #C0392B; border-radius:var(--r2); padding:14px 18px; margin-bottom:14px; }
.overdue-head { font-weight:700; color:#8C1C1C; font-size:14px; margin-bottom:8px; }
.overdue-row { display:flex; justify-content:space-between; align-items:center; padding:5px 0; border-bottom:1px solid rgba(192,57,43,0.12); font-size:13px; }
.overdue-row:last-child { border-bottom:none; }

/* ALARM BANNER */
.alarm-banner { position:fixed; top:76px; right:16px; max-width:330px; z-index:9999; }
@keyframes slideIn { from{opacity:0;transform:translateX(28px);}to{opacity:1;transform:translateX(0);} }
.alarm-card { background:var(--navy); border-radius:var(--r2); border:2px solid var(--gold); padding:16px 18px; margin-bottom:10px; animation:slideIn 0.3s ease; box-shadow:0 8px 30px rgba(13,27,62,0.4); position:relative; overflow:hidden; }
.alarm-card::before { content:''; position:absolute; bottom:-15px; right:-15px; width:80px; height:80px; border-radius:50%; background:rgba(201,162,39,0.08); }
.alarm-head { font-family:'Playfair Display',serif; font-weight:700; font-size:14px; color:var(--gold); margin-bottom:8px; }
.alarm-msg  { font-size:15px; font-weight:600; color:#fff; margin-bottom:3px; }
.alarm-time { font-size:12px; color:var(--gold-mid); margin-bottom:12px; }
.alarm-btns { display:flex; gap:7px; flex-wrap:wrap; }
.a-btn { padding:6px 13px; font-size:12px; font-weight:600; border-radius:8px; cursor:pointer; border:none; font-family:'DM Sans',sans-serif; }
.a-dismiss { background:rgba(255,255,255,0.12); color:rgba(255,255,255,0.7); }
.a-dismiss:hover { background:rgba(255,255,255,0.2); }
.a-speak  { background:var(--gold-soft); color:var(--navy); }
.a-whats  { background:#25D366; color:#fff; }

/* MISC */
.empty { text-align:center; padding:40px 20px; color:var(--text3); }
.empty-icon { font-size:40px; margin-bottom:10px; }
.gold-divider { height:2px; background:linear-gradient(90deg,transparent,var(--gold),transparent); margin:16px 0; border:none; border-radius:2px; }
@keyframes toastIn { from{opacity:0;transform:translate(-50%,10px);}to{opacity:1;transform:translate(-50%,0);} }

/* MOBILE */
@media(max-width:560px){
  .stats{grid-template-columns:repeat(2,1fr);}
  .form-grid{grid-template-columns:1fr;}
  .form-grid.three{grid-template-columns:1fr 1fr;}
  .tabs .tab{font-size:11px;padding:8px 3px;}
  .header{padding:0 14px;}
  .main{padding:10px;}
  .alarm-banner{left:10px;right:10px;max-width:none;}
  .greet-wrap{flex-direction:column;align-items:flex-start;gap:8px;}
}
</style>
</head>
<body>

<div class="header">
  <div class="logo-wrap">
    <div class="logo-icon">🗂</div>
    <div>
      <div class="logo">Secretária Pessoal</div>
      <div class="logo-sub">Fabio Busse — Assistente Diário</div>
    </div>
  </div>
  <div>
    <div class="clock" id="clock">--:--</div>
    <div class="date-str" id="dateStr"></div>
  </div>
</div>

<div class="main">
  <div class="stats" id="statsRow"></div>
  <div class="tabs">
    <button class="tab active" onclick="showTab('hoje')">📍 Hoje</button>
    <button class="tab" onclick="showTab('tarefas')">📋 Tarefas</button>
    <button class="tab" onclick="showTab('compromissos')">📅 Compromissos</button>
    <button class="tab" onclick="showTab('config')">⚙️ Config</button>
  </div>
  <div id="tab-hoje"></div>
  <div id="tab-tarefas"      style="display:none"></div>
  <div id="tab-compromissos" style="display:none"></div>
  <div id="tab-config"       style="display:none"></div>
</div>

<div class="alarm-banner" id="alarmBanner"></div>

<script>
const KEY='secretaria_v4';
function loadState(){try{const r=localStorage.getItem(KEY);if(r)return JSON.parse(r);}catch(e){}return{items:[],config:{name:'Fabio',alertMinutes:15,whatsapp:'',soundOn:true,voiceOn:true,notifOn:true},alerted:{}};}
let S=loadState();
function save(){localStorage.setItem(KEY,JSON.stringify(S));}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,7);}

const CATS={
  traducao:   {label:'Tradução',   badge:'badge-trad',   icon:'📝',cls:'cat-trad'},
  compromisso:{label:'Compromisso',badge:'badge-comp',   icon:'📅',cls:'cat-comp'},
  aula:       {label:'Aula',       badge:'badge-aula',   icon:'🎓',cls:'cat-aula'},
  prazo:      {label:'Prazo',      badge:'badge-prazo',  icon:'⏰',cls:'cat-prazo'},
  pessoal:    {label:'Pessoal',    badge:'badge-pessoal',icon:'👤',cls:'cat-pessoal'}
};
const PRIOS={alta:{label:'Alta',dot:'dot-alta'},media:{label:'Média',dot:'dot-media'},baixa:{label:'Baixa',dot:'dot-baixa'}};
const DAYS=['domingo','segunda-feira','terça-feira','quarta-feira','quinta-feira','sexta-feira','sábado'];
const MONTHS=['janeiro','fevereiro','março','abril','maio','junho','julho','agosto','setembro','outubro','novembro','dezembro'];

function todayISO(){return new Date().toISOString().slice(0,10);}
function tomorrowISO(){const d=new Date();d.setDate(d.getDate()+1);return d.toISOString().slice(0,10);}
function fmtDate(d){if(!d)return'';if(d===todayISO())return'Hoje';if(d===tomorrowISO())return'Amanhã';const[y,m,dd]=d.split('-');return`${dd}/${m}/${y}`;}
function fmtDT(d,t){return fmtDate(d)+(t?' às '+t:'');}
function isOverdue(i){if(i.done||!i.date)return false;return new Date(i.date+'T'+(i.time||'23:59')+':00')<new Date();}

function tickClock(){const n=new Date(),hh=String(n.getHours()).padStart(2,'0'),mm=String(n.getMinutes()).padStart(2,'0');document.getElementById('clock').textContent=hh+':'+mm;document.getElementById('dateStr').textContent=DAYS[n.getDay()]+', '+n.getDate()+' de '+MONTHS[n.getMonth()];}
setInterval(tickClock,1000);tickClock();

function renderStats(){const t=todayISO(),tp=S.items.filter(i=>i.date===t&&!i.done).length,od=S.items.filter(i=>isOverdue(i)).length,pen=S.items.filter(i=>!i.done).length,don=S.items.filter(i=>i.done).length;document.getElementById('statsRow').innerHTML=`<div class="stat s-today"><div class="stat-n">${tp}</div><div class="stat-l">Para hoje</div></div><div class="stat s-late"><div class="stat-n">${od}</div><div class="stat-l">Atrasadas</div></div><div class="stat"><div class="stat-n">${pen}</div><div class="stat-l">Pendentes</div></div><div class="stat s-done"><div class="stat-n">${don}</div><div class="stat-l">Concluídas</div></div>`;}

let activeTab='hoje',showForm=false,fCat='all',fStatus='pendentes';
function showTab(t){activeTab=t;showForm=false;document.querySelectorAll('.tab').forEach((el,i)=>el.classList.toggle('active',['hoje','tarefas','compromissos','config'][i]===t));document.querySelectorAll('[id^=tab-]').forEach(el=>el.style.display='none');document.getElementById('tab-'+t).style.display='';render();}
function render(){renderStats();if(activeTab==='hoje')renderHoje();if(activeTab==='tarefas')renderTarefas();if(activeTab==='compromissos')renderCompromissos();if(activeTab==='config')renderConfig();}

function renderHoje(){
  const today=todayISO(),name=S.config.name||'Fabio',h=new Date().getHours();
  const greet=h<12?'Bom dia':h<18?'Boa tarde':'Boa noite';
  const todayItems=S.items.filter(i=>i.date===today).sort((a,b)=>(a.time||'99:99').localeCompare(b.time||'99:99'));
  const upcoming=S.items.filter(i=>i.date>today&&!i.done).sort((a,b)=>a.date.localeCompare(b.date)||(a.time||'').localeCompare(b.time||'')).slice(0,6);
  const overdues=S.items.filter(i=>isOverdue(i));
  const n=new Date(),nowTime=n.toTimeString().slice(0,5);
  let html=`<div class="greet-wrap"><div><div class="greet-name">${greet}, ${name}! 👋</div><div class="greet-sub">Seu assistente pessoal está pronto</div></div><div><div class="greet-date">${String(n.getDate()).padStart(2,'0')}</div><div class="greet-day">${MONTHS[n.getMonth()].slice(0,3).toUpperCase()} ${n.getFullYear()}</div></div></div>`;
  if(overdues.length){html+=`<div class="overdue-section"><div class="overdue-head">⚠️ ${overdues.length} item${overdues.length>1?'s':''} atrasado${overdues.length>1?'s':''}</div>`;overdues.forEach(i=>{html+=`<div class="overdue-row"><span>${(CATS[i.category]||CATS.pessoal).icon} ${i.title}</span><span style="color:#8C1C1C;font-size:12px;font-weight:500">${fmtDT(i.date,i.time)}</span></div>`;});html+=`</div>`;}
  html+=`<div class="sec-title">Agenda de hoje</div>`;
  if(!todayItems.length){html+=`<div class="empty"><div class="empty-icon">✨</div><div>Nenhuma atividade para hoje</div></div>`;}
  else{html+=`<div class="timeline">`;todayItems.forEach(item=>{const cat=CATS[item.category]||CATS.pessoal,isPast=item.time?item.time<nowTime:false;html+=`<div class="tl-item"><div class="tl-dot ${item.done?'tl-done':isPast?'tl-now':''}"></div><div class="tl-time">${item.time||'Sem horário'}</div><div class="card ${cat.cls}" style="margin-bottom:0"><div class="card-header"><span class="card-title ${item.done?'done-text':''}">${cat.icon} ${item.title}</span><div class="card-actions"><button class="btn-icon btn-check" onclick="toggleDone('${item.id}')">${item.done?'↩':'✓'}</button><button class="btn-icon" onclick="delItem('${item.id}')">✕</button></div></div><div class="card-meta"><span class="badge ${cat.badge}">${cat.label}</span>${item.priority?`<span class="prio-dot ${PRIOS[item.priority].dot}"></span><span class="time-text">${PRIOS[item.priority].label}</span>`:''}</div>${item.notes?`<div class="card-notes">${item.notes}</div>`:''}</div></div>`;});html+=`</div>`;}
  if(upcoming.length){html+=`<hr class="gold-divider"><div class="sec-title">Próximos compromissos</div>`;upcoming.forEach(item=>{const cat=CATS[item.category]||CATS.pessoal;html+=`<div class="card ${cat.cls}"><div class="card-header"><span class="card-title">${cat.icon} ${item.title}</span><span class="time-text" style="font-weight:500">${fmtDT(item.date,item.time)}</span></div><div class="card-meta"><span class="badge ${cat.badge}">${cat.label}</span></div></div>`;});}
  document.getElementById('tab-hoje').innerHTML=html;
}

function renderTarefas(){
  let items=S.items.filter(i=>{if(fCat!=='all'&&i.category!==fCat)return false;if(fStatus==='pendentes')return!i.done;if(fStatus==='concluidas')return i.done;return true;}).sort((a,b)=>{if(a.done!==b.done)return a.done?1:-1;return(a.date||'9999').localeCompare(b.date||'9999')||(a.time||'').localeCompare(b.time||'');});
  let html=`<div class="filter-bar">${fBtn('status','pendentes','Pendentes')}${fBtn('status','concluidas','Concluídas')}${fBtn('status','todas','Todas')}</div><div class="filter-bar"><button class="f-btn ${fCat==='all'?'active':''}" onclick="setFilter('cat','all')">Todas</button>${Object.entries(CATS).map(([k,v])=>`<button class="f-btn ${fCat===k?'active':''}" onclick="setFilter('cat','${k}')">${v.icon} ${v.label}</button>`).join('')}</div>`;
  html+=showForm?addFormHTML('tarefas'):`<button class="add-toggle" onclick="toggleForm()"><span class="add-plus">＋</span> Adicionar nova atividade</button>`;
  if(!items.length)html+=`<div class="empty"><div class="empty-icon">📋</div><div>Nenhuma atividade encontrada</div></div>`;
  else items.forEach(i=>{html+=itemCard(i);});
  document.getElementById('tab-tarefas').innerHTML=html;
}

function fBtn(type,val,label){const v=type==='status'?fStatus:fCat;return`<button class="f-btn ${v===val?'active':''}" onclick="setFilter('${type}','${val}')">${label}</button>`;}

function renderCompromissos(){
  const items=S.items.filter(i=>!i.done).sort((a,b)=>(a.date||'').localeCompare(b.date||'')||(a.time||'99:99').localeCompare(b.time||'99:99'));
  let html=showForm?addFormHTML('compromissos'):`<button class="add-toggle" onclick="toggleForm()"><span class="add-plus">＋</span> Adicionar compromisso com alarme</button>`;
  if(!items.length)html+=`<div class="empty"><div class="empty-icon">📅</div><div>Nenhum compromisso agendado</div></div>`;
  else{let lastDate='';items.forEach(item=>{const cat=CATS[item.category]||CATS.pessoal;if(item.date!==lastDate){lastDate=item.date;html+=`<div class="sec-title">${fmtDate(item.date)} — ${item.date}</div>`;}html+=`<div class="card ${cat.cls}"><div class="card-header"><div style="flex:1"><div class="card-title">${cat.icon} ${item.title}</div>${item.time?`<div style="font-size:28px;font-weight:700;color:var(--gold);line-height:1.2;margin-top:4px">${item.time}</div>`:'<div class="time-text" style="margin-top:4px">Sem horário</div>'}</div><div class="card-actions"><button class="btn-icon btn-check" onclick="toggleDone('${item.id}')">✓</button><button class="btn-icon" onclick="delItem('${item.id}')">✕</button></div></div><div class="card-meta"><span class="badge ${cat.badge}">${cat.label}</span>${item.priority?`<span class="prio-dot ${PRIOS[item.priority].dot}"></span>`:''} ${item.time?`<span class="time-text">🔔 Aviso: ${item.alertMinutes||S.config.alertMinutes} min antes</span>`:''} ${isOverdue(item)?'<span class="overdue-badge">Atrasado</span>':''}</div>${item.notes?`<div class="card-notes">${item.notes}</div>`:''}</div>`;});}
  document.getElementById('tab-compromissos').innerHTML=html;
}

function itemCard(item){const cat=CATS[item.category]||CATS.pessoal,od=isOverdue(item);return`<div class="card ${cat.cls}"><div class="card-header"><span class="card-title ${item.done?'done-text':''}">${cat.icon} ${item.title}</span><div class="card-actions"><button class="btn-icon btn-check" onclick="toggleDone('${item.id}')">${item.done?'↩':'✓'}</button><button class="btn-icon" onclick="delItem('${item.id}')">✕</button></div></div><div class="card-meta"><span class="badge ${cat.badge}">${cat.label}</span>${item.priority?`<span class="prio-dot ${PRIOS[item.priority].dot}"></span><span class="time-text">${PRIOS[item.priority].label}</span>`:''} ${item.date?`<span class="time-text">📅 ${fmtDT(item.date,item.time)}</span>`:''} ${od?'<span class="overdue-badge">Atrasada</span>':''}</div>${item.notes?`<div class="card-notes">${item.notes}</div>`:''}</div>`;}

function addFormHTML(tab){const defCat=tab==='compromissos'?'compromisso':'traducao';return`<div class="add-form"><div class="add-form-title">Nova Atividade</div><div class="form-grid one"><div class="form-group"><label>Título *</label><input type="text" id="f-title" placeholder="Descreva a atividade..."></div></div><div class="form-grid"><div class="form-group"><label>Categoria</label><select id="f-cat">${Object.entries(CATS).map(([k,v])=>`<option value="${k}" ${k===defCat?'selected':''}>${v.icon} ${v.label}</option>`).join('')}</select></div><div class="form-group"><label>Prioridade</label><select id="f-prio"><option value="media">🟡 Média</option><option value="alta">🔴 Alta</option><option value="baixa">🟢 Baixa</option></select></div></div><div class="form-grid three"><div class="form-group"><label>Data</label><input type="date" id="f-date" value="${todayISO()}"></div><div class="form-group"><label>Horário</label><input type="time" id="f-time"></div><div class="form-group"><label>Aviso (min antes)</label><input type="number" id="f-alert" value="${S.config.alertMinutes}" min="1" max="1440"></div></div><div class="form-grid one"><div class="form-group"><label>Notas</label><textarea id="f-notes" placeholder="Links, detalhes, observações..."></textarea></div></div><div class="form-actions"><button class="btn btn-ghost" onclick="toggleForm()">Cancelar</button><button class="btn btn-gold" onclick="addItem()">💾 Salvar</button></div></div>`;}

function toggleForm(){showForm=!showForm;render();}
function addItem(){const title=document.getElementById('f-title')?.value?.trim();if(!title){toast('⚠️ Informe o título!');return;}S.items.push({id:uid(),title,category:document.getElementById('f-cat')?.value||'pessoal',priority:document.getElementById('f-prio')?.value||'media',date:document.getElementById('f-date')?.value||todayISO(),time:document.getElementById('f-time')?.value||'',notes:document.getElementById('f-notes')?.value?.trim()||'',alertMinutes:parseInt(document.getElementById('f-alert')?.value)||S.config.alertMinutes,done:false});showForm=false;save();render();toast('✓ Atividade salva!');}
function toggleDone(id){const i=S.items.find(x=>x.id===id);if(i){i.done=!i.done;save();render();}}
function delItem(id){if(confirm('Excluir esta atividade?')){S.items=S.items.filter(i=>i.id!==id);save();render();}}
function setFilter(t,v){if(t==='cat')fCat=v;if(t==='status')fStatus=v;render();}

function renderConfig(){const c=S.config;document.getElementById('tab-config').innerHTML=`<div class="card"><div class="cfg-section"><div class="cfg-title">👤 Perfil</div><div class="form-grid"><div class="form-group"><label>Seu nome (usado nos avisos de voz)</label><input type="text" id="cfg-name" value="${c.name}"></div><div class="form-group"><label>Número WhatsApp (DDD + número, sem +55)</label><input type="text" id="cfg-wa" value="${c.whatsapp}" placeholder="41999557665"></div></div></div><div class="cfg-section"><div class="cfg-title">🔔 Avisos e Alarmes</div><div class="cfg-row"><div><div class="cfg-label">Antecedência padrão dos avisos</div><div class="cfg-desc">Minutos antes de cada compromisso</div></div><div style="display:flex;align-items:center;gap:6px"><input type="number" id="cfg-min" value="${c.alertMinutes}" min="1" max="1440" style="width:72px;text-align:center"><span style="font-size:13px;color:var(--text2)">min</span></div></div><div class="cfg-row"><div><div class="cfg-label">Som de alarme</div><div class="cfg-desc">Toca um sinal sonoro ao disparar</div></div><button class="toggle ${c.soundOn?'on':''}" onclick="togCfg('soundOn')"></button></div><div class="cfg-row"><div><div class="cfg-label">Aviso por voz</div><div class="cfg-desc">Fala o lembrete em português</div></div><button class="toggle ${c.voiceOn?'on':''}" onclick="togCfg('voiceOn')"></button></div><div class="cfg-row"><div><div class="cfg-label">Notificação pop-up</div><div class="cfg-desc">Aviso na tela do sistema operacional</div></div><button class="toggle ${c.notifOn?'on':''}" onclick="togCfg('notifOn')"></button></div></div><div style="display:flex;gap:8px;flex-wrap:wrap"><button class="btn btn-gold" onclick="saveCfg()">💾 Salvar</button><button class="btn btn-primary" onclick="testAlarm()">🔔 Testar alarme</button><button class="btn btn-ghost" onclick="askNotif()">🔔 Ativar notificações</button></div></div><div class="card" style="margin-top:10px"><div class="cfg-section"><div class="cfg-title">💾 Dados Salvos</div><p style="font-size:13px;color:var(--text2);margin-bottom:14px"><strong style="color:var(--navy)">${S.items.length} atividades</strong> salvas automaticamente.<br>Os dados <strong>não se perdem</strong> ao fechar o programa.</p><button class="btn btn-ghost" style="color:#8C1C1C;border-color:#F5B7B7" onclick="if(confirm('Apagar TODAS as atividades?')){S.items=[];S.alerted={};save();render();toast('Dados apagados.');}">🗑️ Apagar todos os dados</button></div></div>`;}

function togCfg(k){S.config[k]=!S.config[k];renderConfig();}
function saveCfg(){S.config.name=document.getElementById('cfg-name')?.value?.trim()||'Fabio';S.config.whatsapp=document.getElementById('cfg-wa')?.value?.trim()||'';S.config.alertMinutes=parseInt(document.getElementById('cfg-min')?.value)||15;save();toast('✓ Configurações salvas!');renderConfig();}
function askNotif(){Notification.requestPermission().then(p=>toast(p==='granted'?'✓ Notificações ativadas!':'Permissão negada.'));}

function playBeep(){if(!S.config.soundOn)return;try{const ctx=new(window.AudioContext||window.webkitAudioContext)();[[880,0],[1100,480],[880,960]].forEach(([freq,delay])=>{setTimeout(()=>{const osc=ctx.createOscillator(),g=ctx.createGain();osc.connect(g);g.connect(ctx.destination);osc.frequency.value=freq;osc.type='sine';g.gain.setValueAtTime(0.45,ctx.currentTime);g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.45);osc.start();osc.stop(ctx.currentTime+0.45);},delay);});}catch(e){}}

function speak(text){if(!S.config.voiceOn||!window.speechSynthesis)return;speechSynthesis.cancel();const utt=new SpeechSynthesisUtterance(text);utt.lang='pt-BR';utt.rate=0.88;utt.pitch=1;utt.volume=1;const vs=speechSynthesis.getVoices();const v=vs.find(v=>v.lang==='pt-BR')||vs.find(v=>v.lang.startsWith('pt'));if(v)utt.voice=v;speechSynthesis.speak(utt);}
if(window.speechSynthesis)speechSynthesis.onvoiceschanged=()=>{};

function sysNotif(title,body){if(!S.config.notifOn||Notification.permission!=='granted')return;new Notification(title,{body});}

function checkAlarms(){const now=new Date(),today=now.toISOString().slice(0,10),nowMins=now.getHours()*60+now.getMinutes();S.items.forEach(item=>{if(item.done||!item.time||!item.date||item.date<today)return;const ak=item.id+'_'+item.date;if(S.alerted[ak])return;const[hh,mm]=item.time.split(':').map(Number),itemMins=hh*60+mm,mins=item.alertMinutes||S.config.alertMinutes,diff=itemMins-nowMins;if(item.date===today&&diff>=0&&diff<=mins){S.alerted[ak]=true;save();fireAlarm(item,diff);}});}

function fireAlarm(item,minsLeft){const cat=CATS[item.category]||CATS.pessoal,name=S.config.name||'Fabio',mTxt=minsLeft<=1?'agora':'em '+minsLeft+' minuto'+(minsLeft!==1?'s':''),speech=`${name}, lembrete: ${item.title}, ${mTxt}!`;playBeep();speak(speech);sysNotif('⏰ Lembrete',`${cat.icon} ${item.title} — ${item.time}`);showAlarmCard(item,speech,minsLeft);}

function showAlarmCard(item,speech,minsLeft){const cat=CATS[item.category]||CATS.pessoal,banner=document.getElementById('alarmBanner'),aid='al_'+item.id,waNum=(S.config.whatsapp||'').replace(/\D/g,''),waMsg=encodeURIComponent(`⏰ LEMBRETE: ${item.title} — hoje às ${item.time}`),waURL=`https://wa.me/${waNum?'55'+waNum:''}?text=${waMsg}`,ss=speech.replace(/'/g,''),el=document.createElement('div');el.className='alarm-card';el.id=aid;el.innerHTML=`<div class="alarm-head">⏰ LEMBRETE ${minsLeft<=1?'— AGORA!':'— '+minsLeft+' min'}</div><div class="alarm-msg">${cat.icon} ${item.title}</div><div class="alarm-time">Horário: ${item.time} &nbsp;|&nbsp; ${new Date().toLocaleDateString('pt-BR')}</div><div class="alarm-btns"><button class="a-btn a-dismiss" onclick="dismissAlarm('${aid}')">✕ Dispensar</button><button class="a-btn a-speak" onclick="speak('${ss}')">🔊 Falar</button><button class="a-btn a-whats" onclick="window.open('${waURL}','_blank')">📱 WhatsApp</button></div>`;banner.prepend(el);setTimeout(()=>dismissAlarm(aid),5*60*1000);}

function dismissAlarm(id){document.getElementById(id)?.remove();}
function testAlarm(){fireAlarm({id:'test',title:'Reunião de teste',category:'compromisso',time:new Date().toTimeString().slice(0,5),alertMinutes:15},5);}
setInterval(checkAlarms,30000);checkAlarms();

function toast(msg){const el=document.createElement('div');el.style.cssText='position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:var(--navy);color:var(--gold);padding:11px 24px;border-radius:10px;font-size:14px;font-weight:600;z-index:99999;animation:toastIn 0.25s ease;white-space:nowrap;font-family:DM Sans,sans-serif;box-shadow:0 4px 20px rgba(13,27,62,0.35);border:1px solid var(--gold)';el.textContent=msg;document.body.appendChild(el);setTimeout(()=>el.remove(),2500);}

render();
setTimeout(()=>{if(Notification.permission==='default')Notification.requestPermission();},2500);
</script>
</body>
</html>
